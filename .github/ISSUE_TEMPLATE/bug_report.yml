name: Bug report
description: Report a reproducible problem
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Do not include real credentials or private media paths.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include command, dry-run/apply mode, and relevant sanitized environment values.
      placeholder: |
        1. Run `media-maintenance ...`
        2. Review report ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or report excerpt
      description: Paste sanitized logs or JSON report snippets.
      render: text
